name: Morning Match Recaps

on:
  schedule:
    # 6:30 UTC = 8:30 deutsche Sommerzeit – Hauptlauf am Morgen
    - cron: '30 6 * * *'
    # 8:15 UTC = 10:15 – Nachzügler (Spiele an der US-Westküste enden erst ~8:00 deutscher Zeit)
    - cron: '15 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-recaps:
    runs-on: ubuntu-latest
    # Mit dem Daily-Workflow serialisieren – beide pushen auf main
    concurrency:
      group: article-push
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node scripts/recap-agent.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Commit and push recaps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git diff --staged --quiet && exit 0
          git commit -m "Add match recap articles"
          # Race-sicher pushen: vor jedem Versuch neu rebasen.
          # --autostash hält ungestagte Änderungen (z. B. package-lock) aus dem Weg.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Push fehlgeschlagen (Versuch $i) – erneut versuchen…"
            sleep $((RANDOM % 5 + 2))
          done
          echo "Push nach mehreren Versuchen fehlgeschlagen" >&2
          exit 1
