name: Daily WM Agent

on:
  schedule:
    - cron: '0 14 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - run: node scripts/wm-agent.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}